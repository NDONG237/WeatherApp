<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Syndre Weather App</h1>
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name">
            <button id="search-btn">Search</button>
        </div>
        <div id="weather-info" class="weather-info hidden">
            <div class="weather-icon">
                <img id="weather-icon" src="" alt="Weather Icon">
            </div>
            <div class="weather-details">
                <h2 id="city-name"></h2>
                <p id="temperature"></p>
                <p id="description"></p>
                <div class="additional-info">
                    <p>Humidity: <span id="humidity"></span></p>
                    <p>Wind Speed: <span id="wind-speed"></span></p>
                </div>
            </div>
        </div>
        <div id="message" class="message">
            <img src="message/search-city.png" alt="Search for a city">
            <p>Enter a city name to get the weather</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
